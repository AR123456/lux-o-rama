<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Light Meter</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1>LUX<br />METER</h1>
        <div style="text-align: right">
          <div class="subtitle">Ambient Light Sensor</div>
          <div class="subtitle">v1.0 · Google Pixel</div>
        </div>
      </header>

      <div class="dial-container">
        <svg class="dial-svg" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(0,255,231,0.35)" />
              <stop offset="100%" stop-color="rgba(0,255,231,0)" />
            </linearGradient>
          </defs>
          <circle
            class="dial-bg-track"
            cx="100"
            cy="100"
            r="90"
            stroke-dasharray="565"
            stroke-dashoffset="0"
          />
          <circle
            id="dialFill"
            class="dial-fill-track"
            cx="100"
            cy="100"
            r="90"
          />
        </svg>
        <div class="dial-center">
          <div class="lux-value" id="luxValue">---</div>
          <div class="lux-unit">LUX</div>
          <div class="lux-label" id="luxLabel">AWAITING SENSOR</div>
        </div>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Min</div>
          <div class="stat-value" id="minVal">---</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg</div>
          <div class="stat-value" id="avgVal">---</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Max</div>
          <div class="stat-value" id="maxVal">---</div>
        </div>
      </div>

      <div class="log-section">
        <div class="log-header">
          <span>HISTORY (60s)</span>
          <span id="sampleCount">0 samples</span>
        </div>
        <svg id="sparkline" preserveAspectRatio="none" viewBox="0 0 300 50">
          <path id="sparkArea" class="spark-area" d="" />
          <path id="sparkPath" class="spark-line" d="" />
        </svg>
      </div>

      <div class="env-bar">
        <div class="env-segment" id="seg0"></div>
        <div class="env-segment" id="seg1"></div>
        <div class="env-segment" id="seg2"></div>
        <div class="env-segment" id="seg3"></div>
        <div class="env-segment" id="seg4"></div>
        <div class="env-segment" id="seg5"></div>
      </div>
      <div class="env-labels">
        <span>DARK</span>
        <span>DIM</span>
        <span>INDOOR</span>
        <span>BRIGHT</span>
        <span>OUTDOOR</span>
        <span>DIRECT SUN</span>
      </div>

      <div class="controls">
        <button id="startBtn" onclick="startSensor()">▶ START</button>
        <button id="stopBtn" onclick="stopSensor()" style="display: none">
          ■ STOP
        </button>
        <button class="danger" onclick="resetStats()">↺ RESET</button>
      </div>

      <div id="status">
        <span class="dot" id="dot"></span>SENSOR NOT STARTED
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
